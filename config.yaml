paths:
  # chunks_jsonl accepts a single path, a glob pattern, or a list of paths/globs.
  # Examples:
  #   chunks_jsonl: "data/chunks.jsonl"
  #   chunks_jsonl: "data/*.jsonl"
  #   chunks_jsonl: "data/**/metadata.jsonl"
  #   chunks_jsonl:
  #     - "data/儒家.jsonl"
  #     - "data/道家.jsonl"
  chunks_jsonl: "data/*.jsonl"
  questions_xlsx: "data/question.xlsx"
  question_column: "question"          # column name; falls back to first column
  output_dir: "outputs"

ontology:
  target_labels: 50                    # final ontology size target (after seed merge)
  min_labels: 30
  max_labels: 80
  # seed ontology — ALWAYS retained, model can only ADD onto these
  # NOTE: `other` is the mandatory fallback. Every chunk that matches no
  # ethics concept will be labeled "other" so it stays retrievable in RAG
  # (instead of getting [] which is unfilterable).
  seed_labels:
    - filial_piety
    - social_order
    - authority
    - benevolence
    - harm
    - duty
    - ritual
    - collectivism
    - individual_rights
    - virtue_ethics
    - deontology
    - utilitarianism
    - loyalty
    - honesty
    - mercy
    - justice
    - hierarchy
    - autonomy
    - shame
    - face
    - other

embedding:
  model: "BAAI/bge-m3"
  batch_size: 128                      # 256->128: halves bge-m3 peak memory
  max_length: 512
  device: "cuda"
  top_k_labels: 8                      # vLLM only sees top-K per chunk -> tiny output, high quality

llm:
  # Default for 100k–200k chunks (good quality/speed balance):
  model: "Qwen/Qwen2.5-7B-Instruct-AWQ"
  # For 400k chunks tight on time, keep 7B. For <=100k swap to:
  #   model: "Qwen/Qwen2.5-14B-Instruct-AWQ"
  quantization: "awq_marlin"           # fastest AWQ kernel
  dtype: "auto"
  max_model_len: 2048
  gpu_memory_utilization: 0.70         # leave ~6 GB for bge-m3 co-resident on 24 GB
  tensor_parallel_size: 1
  enforce_eager: false                 # CUDA graphs ON for max throughput
  max_num_seqs: 256                    # vLLM running batch
  max_num_batched_tokens: 8192
  swap_space: 4                        # GB CPU swap
  trust_remote_code: true

inference:
  mega_batch: 4096                     # chunks per pipeline round (embed -> LLM)
  max_chunk_chars: 800                 # truncate long chunks
  temperature: 0.0
  max_tokens: 64                       # output is JSON like {"labels":["a","b"]}
  threshold_score: 0.30                # cosine threshold; below -> dropped from candidates
  max_labels_per_chunk: 5

io:
  flush_every_records: 500
